name: image-devenv-main-amd64
run-name: "[ref:${{ github.ref }}] [user:${{ github.actor }}]"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/image-devenv-main-amd64.yaml
      - images/devenv-main-amd64/**
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: checkout
        uses: actions/checkout@v3
    
      - name: login
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
    
      - name: build
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ghcr.io/whiterabbit7516/devcontainers/devenv-main-amd64
          imageName: ghcr.io/whiterabbit7516/devcontainers/devenv-main-amd64
          push: always
          subFolder: images/devenv-main-amd64/
